<title>Маняша — widget shell</title>
<script>
  (function () {
    var connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    var saveData = !!(connection && connection.saveData);
    var store = window.__manyashaColdStartMedia = window.__manyashaColdStartMedia || [];
    var base = './mascot/v/';
    var queue = saveData
      ? [
        ['manyasha-greeting.mp4', 0],
        ['manyasha-thinking.mp4', 180],
        ['manyasha-answering.mp4', 360]
      ]
      : [
        ['manyasha-greeting.mp4', 0],
        ['manyasha-thinking.mp4', 180],
        ['manyasha-answering.mp4', 360],
        ['manyasha-listening.mp4', 920]
      ];
    function warm(file) {
      try {
        var video = document.createElement('video');
        video.preload = 'auto';
        video.muted = true;
        video.playsInline = true;
        video.setAttribute('playsinline', '');
        video.setAttribute('aria-hidden', 'true');
        video.style.cssText = 'position:fixed;width:1px;height:1px;left:-9999px;top:-9999px;opacity:0;pointer-events:none;';
        video.src = base + file;
        store.push(video);
        video.load();
      } catch (_err) {}
    }
    queue.forEach(function (item) {
      if (item[1] <= 0) warm(item[0]);
      else setTimeout(function () { warm(item[0]); }, item[1]);
    });
  })();
</script>

            font-size: 0.83rem;
            line-height: 1.35;
            outline: none;
        }

        #manyasha-chat-input:focus {
            border-color: rgba(41, 102, 194, 0.62);
            box-shadow: 0 0 0 3px rgba(64, 124, 214, 0.18);
        }

        #manyasha-chat-send,
        #manyasha-sound-toggle,
        #manyasha-voice-btn {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            border: 1px solid rgba(37, 88, 162, 0.2);
            display: inline-grid;
            place-items: center;
            cursor: pointer;
            transition: 0.16s ease;
        }

        #manyasha-chat-send {
            color: #fff;
            background: linear-gradient(135deg, #1c57b3, #2f70dc);
            box-shadow: 0 8px 18px rgba(23, 70, 145, 0.22);
            border-color: rgba(23, 70, 145, 0.35);
        }

        #manyasha-chat-send svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        #manyasha-chat-send:disabled {
            opacity: 0.48;
            cursor: not-allowed;
        }

        #manyasha-sound-toggle,
        #manyasha-voice-btn {
            color: #2f5f9f;
            background: #f6faff;
        }

        #manyasha-sound-toggle.muted {
            color: #7b879a;
            background: rgba(244, 247, 251, 0.92);
        }

        #manyasha-sound-toggle svg,
        #manyasha-voice-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        #manyasha-voice-btn.listening {
            color: #fff;
            border-color: rgba(31, 96, 181, 0.35);
            background: linear-gradient(135deg, #2e73df, #1b57b0);
            box-shadow: 0 8px 16px rgba(32, 83, 160, 0.23);
        }

        #manyasha-voice-status {
            display: none;
            align-items: center;
            gap: 8px;
            font-size: 0.68rem;
            color: #476690;
            background: rgba(239, 246, 255, 0.9);
            border: 1px solid rgba(47, 95, 168, 0.18);
            border-radius: 9px;
            padding: 4px 8px;
            line-height: 1.25;
            max-width: min(100%, 230px);
            width: fit-content;
        }

        #manyasha-voice-status.visible {
            display: inline-flex;
        }

        #manyasha-voice-status-text {
            display: block;
            max-width: 190px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #manyasha-voice-status .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #7d95bc;
        }

        #manyasha-voice-status.state-listening .dot { background: #6b9ad4; }
        #manyasha-voice-status.state-thinking .dot { background: #a0723d; }
        #manyasha-voice-status.state-speaking .dot { background: #2a5a8f; }
        #manyasha-voice-status.state-error .dot { background: #b64f4f; }

        #manyasha-voice-consent {
            display: none !important;
            align-items: center;
            justify-content: space-between;
            border-radius: 10px;
            border: 1px solid rgba(39, 88, 157, 0.12);
            background: rgba(255, 255, 255, 0.38);
            padding: 5px 7px;
            gap: 6px;
        }

        #manyasha-voice-consent.visible {
            display: flex;
        }

        #manyasha-voice-consent .consent-copy {
            min-width: 0;
            font-size: 0.66rem;
            color: rgba(81, 109, 148, 0.82);
            line-height: 1.25;
        }

        #manyasha-voice-consent .consent-actions {
            display: flex;
            gap: 4px;
            flex: 0 0 auto;
            flex-wrap: nowrap;
        }

        #manyasha-voice-consent button {
            border: 1px solid rgba(39, 88, 157, 0.14);
            background: rgba(255, 255, 255, 0.56);
            color: rgba(46, 95, 158, 0.82);
            border-radius: 999px;
            font-size: 0.66rem;
            font-weight: 650;
            padding: 4px 7px;
            cursor: pointer;
            white-space: nowrap;
        }

        #manyasha-consult-cta {
            width: 100%;
            border: 1px solid rgba(118, 91, 62, 0.16);
            background: #fffaf2;
            color: rgba(86, 65, 43, 0.78);
            border-radius: 10px;
            font-size: 0.72rem;
            font-weight: 650;
            letter-spacing: 0;
            padding: 6px 10px;
            cursor: pointer;
        }

        #manyasha-quick-panel {
            display: none;
            flex-wrap: wrap;
            gap: 6px;
        }

        #manyasha-quick-panel.visible {
            display: flex;
        }

        .quick-reply-btn,
        .suggested-q-btn,
        .cx-feedback-btn {
            border: 1px solid rgba(39, 88, 157, 0.18);
            background: #fff;
            color: #2d5b96;
            border-radius: 999px;
            font-size: 0.69rem;
            font-weight: 700;
            padding: 6px 9px;
            cursor: pointer;
        }

        .quick-reply-btn:hover,
        .suggested-q-btn:hover,
        .cx-feedback-btn:hover {
            background: #f2f7ff;
            border-color: rgba(39, 88, 157, 0.3);
        }

        .consult-modal-root {
            position: fixed;
            inset: 0;
            z-index: 1100;
            display: none;
        }

        .consult-modal-root[aria-hidden="false"] {
            display: block;
        }

        .consult-modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(11, 30, 58, 0.48);
            backdrop-filter: blur(2px);
        }

        .consult-modal-dialog {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: min(420px, calc(100vw - 22px));
            border-radius: 18px;
            border: 1px solid rgba(32, 74, 136, 0.22);
            background: #fff;
            box-shadow: 0 26px 50px rgba(11, 30, 58, 0.28);
            padding: 18px;
            display: grid;
            gap: 8px;
        }

        .consult-modal-close {
            position: absolute;
            right: 10px;
            top: 8px;
            border: 0;
            background: transparent;
            color: #4f6f9a;
            font-size: 1.45rem;
            line-height: 1;
            cursor: pointer;
        }

        .consult-modal-dialog .cp-title {
            margin: 0 24px 4px 0;
            font-size: 1rem;
            font-weight: 800;
            color: #1d467f;
        }

        .consult-modal-dialog input {
            width: 100%;
            border-radius: 11px;
            border: 1px solid rgba(39, 88, 157, 0.2);
            padding: 10px 11px;
            font-size: 0.84rem;
            outline: none;
        }

        .consult-modal-dialog input:focus {
            border-color: rgba(41, 102, 194, 0.62);
            box-shadow: 0 0 0 3px rgba(64, 124, 214, 0.14);
        }

        .consult-modal-dialog .cp-row {
            margin-top: 2px;
            display: flex;
            gap: 8px;
        }

        .consult-modal-dialog .cp-submit,
        .consult-modal-dialog .cp-cancel {
            border: 0;
            border-radius: 10px;
            padding: 10px 11px;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
        }

        .consult-modal-dialog .cp-submit {
            flex: 1;
            color: #fff;
            background: linear-gradient(135deg, #1c57b3, #2f70dc);
        }

        .consult-modal-dialog .cp-cancel {
            color: #2e5f9e;
            background: #eef4ff;
            border: 1px solid rgba(39, 88, 157, 0.2);
        }

        .consult-modal-dialog .cp-error {
            display: none;
            font-size: 0.76rem;
            color: #a53737;
        }

        .consult-modal-dialog .cp-error.visible {
            display: block;
        }

        @media (max-width: 680px) {
            #manyasha-widget {
                right: 0;
                bottom: 0;
                width: 100vw;
                max-width: none;
            }

            #manyasha-widget.chat-expanded,
            #manyasha-widget.chat-fullsize {
                width: 100vw;
                max-width: none;
            }

            #manyasha-chat-messages {
                max-height: 155px;
            }
        }
    </style>
</head>
<body class="manyasha-widget-shell">
    <div id="manyasha-widget">
      <div id="manyasha-card">
        <div id="manyasha-header">
            <div id="manyasha-identity">

            </div>

                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 10a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/></svg>
                </button>
                <button id="manyasha-hide-btn" class="manyasha-icon-btn" type="button" title="Скрыть Маняшу" aria-label="Скрыть Маняшу">
                    <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
            </div>
            <div id="manyasha-menu-panel" aria-hidden="true">
                <button id="manyasha-expand-btn" class="manyasha-menu-item" type="button" title="Развернуть чат" aria-label="Развернуть">
                    <svg id="manyasha-expand-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
                    </svg>
                    <span id="manyasha-expand-label">Развернуть чат</span>
                </button>
                <button id="manyasha-mute-btn" class="manyasha-menu-item" type="button" title="Выключить голос" aria-label="Выключить голос">
                    <svg id="manyasha-mute-icon" width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" fill="currentColor"/></svg>
                    <span id="manyasha-mute-label">Выключить голос</span>
                </button>
            </div>
        </div>
        <div id="manyasha-stage-wrap">
            <div id="manyasha-stage">
                <img id="manyasha-stage-fallback" src="data:image/gif;base64,R0lGODlhAQABAAAAACw=" alt="" aria-hidden="true">
                <video id="mv-a" playsinline muted preload="auto"></video>
                <video id="mv-b" playsinline muted preload="auto"></video>
            </div>
        </div>
        <div class="manyasha-content">
        <!-- Чат -->
        <div id="manyasha-chat">
            <div id="manyasha-ops-status" aria-live="polite"></div>
            <div id="manyasha-bootstrap-status" aria-live="polite"></div>
            <div id="manyasha-chat-messages"></div>
            <button type="button" id="manyasha-scroll-bottom" aria-label="Прокрутить к последним сообщениям" title="Вниз">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
            </button>
            <form id="manyasha-chat-form" autocomplete="off">
                <textarea id="manyasha-chat-input" rows="1" placeholder="Спросите Маняшу..." maxlength="500"></textarea>
                <button id="manyasha-sound-toggle" type="button" title="Выключить голос" aria-label="Выключить голос" aria-pressed="true">
                    <svg id="manyasha-sound-toggle-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" fill="currentColor"/></svg>
                </button>
                <button id="manyasha-voice-btn" type="button" title="Голосовой ввод" aria-label="Голосовой ввод">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15a3 3 0 0 0 3-3V7a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3zm5-3a1 1 0 1 1 2 0 7 7 0 0 1-6 6.92V21h2a1 1 0 1 1 0 2H9a1 1 0 1 1 0-2h2v-2.08A7 7 0 0 1 5 12a1 1 0 1 1 2 0 5 5 0 0 0 10 0z"/></svg>
                </button>
                <button id="manyasha-chat-send" type="submit" title="Отправить">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>

            <div id="manyasha-voice-status" aria-live="polite">
                <span class="dot"></span>
                <span id="manyasha-voice-status-text">Слушаю…</span>

            <!-- Быстрые ответы + рекомендованные вопросы (обновляются после каждого ответа Маняши) -->

                <div id="manyasha-suggested"></div>
            </div>
        </div>
        </div><!-- /.manyasha-content -->
        </div>
      </div>

    <!-- Модальное окно: запись на консультацию -->
    <div id="manyasha-consult-modal" class="consult-modal-root" aria-hidden="true" inert>

        <style>
        #manyasha-show-btn {
            font-family: var(--mx-font-family, 'Inter', sans-serif);

            align-items: center;

            box-shadow: 0 8px 18px rgba(20, 44, 78, 0.16);
            transition: box-shadow 0.25s;

            box-shadow: 0 12px 24px rgba(20, 44, 78, 0.2);
        }
        #manyasha-teaser-name {
            font-size: 0.62rem;
            font-weight: 700;
            color: rgba(27, 72, 130, 0.86);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        #manyasha-teaser-text {
            font-size: 0.72rem;
            color: rgba(24, 41, 67, 0.94);
            line-height: 1.35;
            font-weight: 500;

        #manyasha-teaser-cta {
            margin-top: 5px;
            display: inline-flex;
            align-items: center;
            gap: 3px;

            font-size: 0.64rem;
            font-weight: 700;
            padding: 0;
            border-radius: 20px;
            letter-spacing: 0.02em;
            box-shadow: none;
        }
        #manyasha-teaser-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #2f7bdb;
            box-shadow: 0 0 0 0 rgba(47,123,219,0.42);
            animation: teaser-ping 2.3s ease-in-out infinite;
            margin-right: 2px;
            flex-shrink: 0;
        }
        @keyframes teaser-ping {
            0%   { box-shadow: 0 0 0 0 rgba(47,123,219,0.42); }

            100% { box-shadow: 0 0 0 0 rgba(47,123,219,0); }

            0%, 100% { transform: translateY(0); }
            45% { transform: translateY(-2px); }

        #manyasha-teaser-avatar.teaser-attn {
            animation: teaser-soft-nudge 0.5s ease;
        }
        #manyasha-teaser-msg {
            display: inline;
        }

                transition-duration: 0.01ms !important;

            #manyasha-teaser-text {
                font-size: 0.68rem;
            }
