services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ailegal
      POSTGRES_USER: ailegal
      POSTGRES_PASSWORD: ailegal_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ailegal"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ailegal:ailegal_secret@db:5432/ailegal?schema=public
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
    ports:
      - "127.0.0.1:3005:3000"

volumes:
  pgdata:
