groups:
  - name: manaya-platform
    rules:
      - alert: ManayaApiHighLatency
        expr: histogram_quantile(0.95, sum(rate(manaya_http_request_latency_seconds_bucket[5m])) by (le, path)) > 1.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'Высокая latency API Manaya'
          description: 'P95 latency превысила 1.2 секунды. Проверьте FastAPI, БД и внешние зависимости.'

      - alert: ManayaFrontendTTFMTooHigh
        expr: max_over_time(manaya_frontend_ttfm_seconds[10m]) > 4
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'TTFM превышает SLA'
          description: 'TTFM больше 4 секунд. Проверьте CDN, фронтенд бандл и сетевую деградацию.'

      - alert: ManayaFrontendFpsLow
        expr: min_over_time(manaya_frontend_fps[10m]) < 30
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'FPS ниже целевого порога'
          description: 'FPS опустился ниже 30. Проверьте WebGL fallback, размер ассетов и GPU benchmark.'

      - alert: ManayaLlmTimeoutSpike
        expr: increase(manaya_llm_timeout_total[15m]) > 5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: 'Серия таймаутов LLM'
          description: 'Количество таймаутов LLM резко выросло. Проверьте upstream LLM, SSE и retries.'

      - alert: ManayaWidgetInstallHealthErrorBurst
        expr: sum(increase(manaya_widget_install_health_total{status="error"}[10m])) > 20
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: 'Массовые ошибки install-health у партнёров'
          description: 'За 10 минут накопилось >20 install-health ошибок. Проверьте install_token/site_key/origin и доступность embed.'

      - alert: ManayaWidgetInstallHealthErrorRateHigh
        expr: (sum(rate(manaya_widget_install_health_total{status="error"}[10m])) / clamp_min(sum(rate(manaya_widget_install_health_total[10m])), 0.001)) > 0.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'Высокая доля install-health ошибок'
          description: 'Доля install-health со статусом error превышает 20% более 10 минут.'

      - alert: ManayaWidgetInstallOriginMismatchSpike
        expr: sum(increase(manaya_widget_install_health_check_total{name="origin",code="origin_not_allowlisted"}[10m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Скачок origin_not_allowlisted'
          description: 'Часто встречается origin_not_allowlisted. Проверьте allowlist доменов партнёров.'

      - alert: ManayaWidgetInstallTokenFailuresSpike
        expr: sum(increase(manaya_widget_install_health_check_total{name="install_token",code=~"install_token_required|install_token_invalid|install_token_expired|install_token_origin_mismatch|install_token_site_key_mismatch"}[10m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Скачок install_token ошибок'
          description: 'Ошибка установки токена часто повторяется. Нужна проверка ротации токенов и embed-конфига.'
