<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' http://127.0.0.1:8000; style-src 'self' 'unsafe-inline'; img-src 'self' data: http://127.0.0.1:8000 http://127.0.0.1:5173; frame-src 'none'; connect-src 'self' http://127.0.0.1:8000;">
  <title>Manyasha CSP Embed (blocked)</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: #163152;
      background:
        radial-gradient(900px 540px at -10% -20%, #eaf2ff 0%, transparent 56%),
        radial-gradient(700px 480px at 110% -10%, #fff1de 0%, transparent 60%),
        #f9fbff;
    }
    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 28px 18px 92px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(24px, 4.8vw, 40px);
      color: #224b7a;
      line-height: 1.12;
    }
    p {
      margin: 0;
      color: #5f7998;
      line-height: 1.55;
    }
    .card {
      margin-top: 16px;
      border-radius: 18px;
      border: 1px solid #d7e6fb;
      background: #fff;
      box-shadow: 0 12px 34px rgba(26, 66, 114, 0.09);
      padding: 16px;
    }
    #manyasha-status {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 600;
      color: #4f6f95;
      white-space: pre-line;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>CSP smoke: iframe запрещен</h1>
    <p>На этой странице `frame-src 'none'`, поэтому виджет обязан показать явный health-error, а не «тихо зависнуть».</p>
    <div class="card">
      <strong>Статус интеграции</strong>
      <div id="manyasha-status">SDK: ожидание загрузки...</div>
    </div>
  </div>

  <script
    src="http://127.0.0.1:8000/embed.js?id=default&v=cspblocked1"
    data-instance="ext-csp-blocked"
    data-size="large"
    data-side="right"
    data-start-open="true"
    data-launcher="avatar"
    data-api-origin="http://127.0.0.1:8000"
    data-widget-origin="http://127.0.0.1:5173"
    data-offset-x="16"
    data-offset-y="16"
    defer
  ></script>

  <script>
    (function () {
      var statusEl = document.getElementById('manyasha-status');

      function getApi() {
        if (!window.ManyashaWidget || typeof window.ManyashaWidget.get !== 'function') return null;
        return window.ManyashaWidget.get('ext-csp-blocked');
      }

      function syncStatus() {
        var api = getApi();
        if (!api) {
          statusEl.textContent = 'SDK: не найден (ждём загрузку)';
          return;
        }
        var health = (typeof api.getInstallHealth === 'function') ? (api.getInstallHealth() || {}) : {};
        statusEl.textContent = 'SDK: готов, состояние ' + (api.isOpen() ? 'OPEN' : 'CLOSED')
          + '\nhealth: ' + String(health.status || 'unknown') + '/' + String(health.code || 'unknown')
          + (health.message ? ('\n' + String(health.message)) : '');
      }

      window.addEventListener('manyasha:install-health', syncStatus);
      setInterval(syncStatus, 700);
      syncStatus();
    })();
  </script>
</body>
</html>
